name: Update Proxy URLs List
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */14 * *'


jobs:
  Update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}  # 👈 确保使用正确的分支
          token: ${{ secrets.GITHUB_TOKEN }}  # 👈 使用 GitHub Token 进行认证

      - name: Setup Python
        uses: actions/setup-python@v5  # 👈 升级到 v5（v2 已过时）
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install lxml
          pip install aiohttp
        
    
      - name: Run script
        run: python ./main/get_proxyurls.py


      - name: Commit and push changes
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .    
            if ! git diff --cached --quiet; then
            echo "Changes detected. Proceeding to commit."
            else
                echo "No changes. Skipping commit."
                exit 0
            fi
            git commit -m "Update content - $(TZ=Asia/Shanghai date +"%Y-%m-%dT%H:%M:%SZ")"
            git push origin ${{ github.ref_name }}
            echo "Changes pushed successfully."
            exit 0
        
