name: ipv6 Test
on:
  workflow_dispatch:


jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
      
        

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}  # 👈 确保使用正确的分支
          token: ${{ secrets.GITHUB_TOKEN }}  # 👈 使用 GitHub Token 进行认证

      - name: install warp
        run: |
          echo "Installing Cloudflare WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          echo "Installation complete."
          warp-cli --version
      
      - name: connect warp
        run: |
          echo "Preparing WARP configuration..."
          
          # 1. 确保配置目录存在
          sudo mkdir -p /var/lib/cloudflare-warp
          
          # 2. 【关键技巧】直接创建/reg.json 文件来跳过 TOS 提示
          # 这样 warp-cli 会认为用户已经同意了条款
          echo '{"tos_accepted": true}' | sudo tee /var/lib/cloudflare-warp/reg.json > /dev/null
          
          echo "Registering device (non-interactive)..."
          # 尝试注册。如果上面创建了 reg.json，通常可以直接成功。
          # 如果仍然报错，尝试使用 expect 或纯后台模式，但通常上面的方法在 Ubuntu 上有效。
          # 注意：某些新版本可能需要先运行一次 new 生成 key，再修改文件，再 connect。
          # 为了最稳妥，我们采用：先运行 new (忽略 TOS 错误)，强制修改文件，再 connect。
          
          # 尝试运行 new，即使它因 TOS 失败也没关系，因为它可能生成了部分文件
          warp-cli registration new || true
          
          # 再次强制写入同意状态 (覆盖任何未完成的注册状态)
          # 格式必须是有效的 JSON
          echo '{"tos_accepted": true, "organization": ""}' | sudo tee /var/lib/cloudflare-warp/reg.json > /dev/null
          
          # 如果 reg.json 不存在，可能是路径不同，尝试 ~/.cloudflare-warp (虽然 systemd 服务通常用 /var/lib)
          # 对于 GitHub Actions 的 systemd 服务，路径通常是 /var/lib/cloudflare-warp/reg.json
          
          echo "Setting mode to system..."
          warp-cli mode system
          
          echo "Connecting..."
          warp-cli connect
          
          sleep 5
          
          echo "Checking status..."
          warp-cli status
          
          # 验证是否真的连上了
          if ! warp-cli status | grep -q "Connected"; then
             echo "Connection failed. Trying alternative registration method..."
             # 备选方案：有些版本支持 'registration new --no-gui' 或其他变体，但修改文件是最通用的
             exit 1
          fi
     
      - name: Run script
        run: | 
          ping6 -c 1 ipv6.google.com || echo "IPv6 not working"

      - name: Disconnect WARP
        if: always()
        run: |
          echo "Disconnecting WARP..."
          warp-cli disconnect || true
